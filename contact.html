<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comrade Choice bakery</title>
    <link rel="stylesheet" href="/Comrade-choice-bakery/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400..700;1,400..700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<!--This is the navbar section-->
<header class="header">
    <div class="logo-container">
        <img src="/Comrade-choice-bakery/Images/comrade-removebg-preview.png" alt="logo">
        <span class="brand-text">Comrade Choice Bakery</span>
    </div>

    <div class="menu-toggle">
      <button class="hamburger" aria-label="Toggle navigation"><i class="fas fa-bars"></i></button>
    </div>

<nav class="navbar">
    <ul>
        <li><a href="/Comrade-choice-bakery/index.html">Home</a></li>
         <li><a href="/Comrade-choice-bakery/about.html">About</a></li>
          <li><a href="/Comrade-choice-bakery/menu.html">Menu</a></li>
           <li><a href="/Comrade-choice-bakery/gallery.html">Gallery</a></li>
            <li><a href="/Comrade-choice-bakery/contact.html">Contact us</a></li>


</nav>

    <div class="header-icons">
        <button aria-label="search"><i class="fas fa-search"></i></button>
        <button aria-label="cart"><i class="fas fa-shopping-cart"></i></button>
    </div>
</header>

<!--This is the contact us section-->
<section class="contact-section">
   <h2>Contact Us</h2>
<div class="contact-container">
  <!--The left part - Contact Info-->
    <div class="contact-info">
    <h3 class="visit-shop-heading">Visit Our Shop</h3>
    
    <div class="info-group">
      <div class="contact-icon">
        <i class="fas fa-location-dot"></i>
      </div>
      <div class="info-content">
        <h4>Address</h4>
        <p>University of Eldoret<br>Eldoret city</p>
      </div>
    </div>
    
    <div class="info-group">
      <div class="contact-icon">
        <i class="fas fa-phone"></i>
      </div>
      <div class="info-content">
        <h4>Phone</h4>
        <p>+254743687671</p>
      </div>
    </div>
    
    <div class="info-group">
      <div class="contact-icon">
        <i class="fas fa-envelope"></i>
      </div>
      <div class="info-content">
        <h4>Email</h4>
        <p>comradechoicebakery@gmail.com</p>
      </div>
    </div>
  </div>

  <!--The right part that is the Contact Form-->
  <div class="contact-form-container">
    <form class="contact-form" id="contactForm">
      <div class="form-group">
        <input type="text" id="fullname" name="fullname" placeholder="Full Name" required>
      </div>
      
      <div class="form-group">
        <input type="email" id="email" name="email" placeholder="Email Address" required>
      </div>
      
      <div class="form-group">
        <input type="tel" id="phone" name="phone" placeholder="Phone Number">
      </div>
      
      <div class="form-group">
        <input type="text" id="subject" name="subject" placeholder="Subject" required>
      </div>
      
      <div class="form-group">
        <textarea id="message" name="message" placeholder="Your Message" rows="5" required></textarea>
      </div>
      
      <button type="submit" class="submit-btn">Send Message</button>
    </form>
  </div>
</div>





   </div>









</section>






     <script src="index.js"></script> 
</body>
</html>
